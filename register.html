<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AetherClan - Node Registration</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050512; color: #0f0; font-family: 'Courier New', monospace; min-height: 100vh; }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
    .container { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .box { width: 100%; max-width: 420px; background: rgba(5,5,18,.85); border: 1px solid #4de0ff; box-shadow: 0 0 40px rgba(77,224,255,.12); border-radius: 24px; padding: 32px; }
    h1 { font-size: 22px; color: #4de0ff; text-align: center; margin-bottom: 12px; letter-spacing: 1.5px; }
    p { color: #9ee7ff; font-size: 12px; text-align: center; margin-bottom: 24px; }
    label { display: block; margin-bottom: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: .15em; color: #70e3ff; }
    input { width: 100%; padding: 12px 14px; border: 1px solid rgba(77,224,255,.45); border-radius: 12px; background: rgba(15,15,30,.95); color: #d6ffe6; font-size: 13px; margin-bottom: 14px; }
    input:focus { outline: none; border-color: #ff3ea5; box-shadow: 0 0 14px rgba(255,62,165,.2); }
    .button { width: 100%; padding: 14px; border: none; border-radius: 14px; background: #ff3ea5; color: #050512; font-weight: 700; letter-spacing: .12em; cursor: pointer; }
    .button:disabled { opacity: .55; cursor: not-allowed; }
    .message { min-height: 20px; margin-bottom: 16px; font-size: 12px; line-height: 1.4; }
    .message.error { color: #ff7fbf; }
    .message.success { color: #8cff9f; }
    .footer { margin-top: 12px; text-align: center; font-size: 11px; }
    .footer a { color: #4de0ff; text-decoration: none; }
  </style>
</head>
<body>
  <canvas id="matrix-bg"></canvas>
  <div class="container">
    <div class="box">
      <h1>AetherClan Node Deploy</h1>
      <p>Create a new node and register it with Supabase.</p>
      <div id="message" class="message"></div>

      <!-- Discord OAuth Login -->
      <div style="margin-bottom: 24px;">
        <button id="discord-login-btn" type="button" style="width: 100%; padding: 12px; border: none; border-radius: 14px; background: #5865F2; color: white; font-weight: 700; letter-spacing: .12em; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px;">
          🎮 LOGIN WITH DISCORD
        </button>
      </div>

      <div style="text-align: center; margin-bottom: 16px; font-size: 11px; color: #70e3ff; text-transform: uppercase; letter-spacing: .15em;">
        or deploy manually
      </div>

      <!-- Email Registration Form -->
      <form id="register-form">
        <label for="username">Character Node ID</label>
        <input id="username" name="username" type="text" placeholder="e.g. pernzy" autocomplete="off" required>
        <label for="password">Passkey</label>
        <input id="password" name="password" type="password" placeholder="8+ characters" required>
        <label for="password-confirm">Confirm Passkey</label>
        <input id="password-confirm" name="password-confirm" type="password" placeholder="Repeat passkey" required>
        <button id="submit-btn" class="button" type="submit">DEPLOY NODE</button>
      </form>
      <div class="footer">Already registered? <a href="index.html">Log in</a></div>
    </div>
  </div>
  <script>
    function initMatrix() {
      const canvas = document.getElementById('matrix-bg');
      const ctx = canvas.getContext('2d');
      const alphabet = '01ABCDEF@#$%^&*<>?~'.split('');
      const fontSize = 16;
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      let columns = Math.floor(canvas.width / fontSize);
      let drops = Array(columns).fill(1);
      function draw() {
        ctx.fillStyle = 'rgba(5,5,18,.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = `${fontSize}px monospace`;
        for (let x = 0; x < drops.length; x++) {
          const text = alphabet[Math.floor(Math.random() * alphabet.length)];
          ctx.fillStyle = 'rgba(77,224,255,.85)';
          ctx.fillText(text, x * fontSize, drops[x] * fontSize);
          if (drops[x] * fontSize > canvas.height && Math.random() > 0.975) drops[x] = 0;
          drops[x]++;
        }
      }
      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; columns = Math.floor(canvas.width / fontSize); drops = Array(columns).fill(1); }
      window.addEventListener('resize', resize);
      setInterval(draw, 45);
    }

    window.addEventListener('DOMContentLoaded', () => {
      initMatrix();

      // Discord OAuth Login
      const discordLoginBtn = document.getElementById('discord-login-btn');
      discordLoginBtn.addEventListener('click', async () => {
        discordLoginBtn.disabled = true;
        discordLoginBtn.textContent = 'INITIALIZING DISCORD AUTH...';
        try {
          const supabase = getSupabase();
          const { data, error } = await supabase.auth.signInWithOAuth({
            provider: 'discord',
            options: {
              redirectTo: window.location.origin + '/dashboard.html'
            }
          });
          if (error) throw error;
        } catch (error) {
          console.error('[Discord Login] Error:', error);
          document.getElementById('message').textContent = error.message || 'Discord auth failed.';
          document.getElementById('message').className = 'message error';
          discordLoginBtn.disabled = false;
          discordLoginBtn.textContent = '🎮 LOGIN WITH DISCORD';
        }
      });

      // Email Registration Form
      const form = document.getElementById('register-form');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const confirmInput = document.getElementById('password-confirm');
      const message = document.getElementById('message');
      const submitBtn = document.getElementById('submit-btn');

      function setMessage(text, status) {
        message.textContent = text;
        message.className = `message ${status || ''}`.trim();
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        setMessage('', '');
        const username = usernameInput.value.trim().toLowerCase();
        const password = passwordInput.value;
        const confirm = confirmInput.value;

        if (username.length < 3 || !/^[a-z0-9_-]+$/.test(username)) {
          return setMessage('Username must be 3+ chars and only letters/numbers/_/-.', 'error');
        }
        if (password.length < 8) {
          return setMessage('Passkey must be at least 8 characters.', 'error');
        }
        if (password !== confirm) {
          return setMessage('Passkeys do not match.', 'error');
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'DEPLOYING...';

        try {
          const supabase = getSupabase();
          const userEmail = `${username}@gmail.com`;

          const { data: authData, error: authError } = await supabase.auth.signUp({ email: userEmail, password });
          if (authError) throw authError;
          if (!authData.user) throw new Error('Auth user creation failed.');

          const { data: profile, error: profileError } = await supabase
            .from('profiles')
            .insert({
              id: authData.user.id,
              character_name: username,
              account_status: 'ACTIVE',
              rolling_7_day_points: 0,
              current_month_points: 0,
              created_at: new Date().toISOString(),
              updated_at: new Date().toISOString()
            })
            .select('id, character_name, account_status')
            .single();

          if (profileError) throw profileError;

          setMessage('Node deployed successfully. Redirecting to login...', 'success');
          setTimeout(() => window.location.href = 'index.html', 1800);
        } catch (error) {
          console.error('[Register] Exception:', error);
          setMessage(error.message || 'Deployment failed.', 'error');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'DEPLOY NODE';
        }
      });
    });
  </script>
</body>
</html>
