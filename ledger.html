<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AETHERCLAN // EVENT_LEDGER.sys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 scanlines p-4 lg:p-8">

    <!-- TOP HEADER INTERFACE -->
    <header class="max-w-7xl mx-auto mb-8 border border-amber-500/30 bg-slate-900/40 backdrop-blur p-4 rounded flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-amber-500 rounded-full shadow-[0_0_8px_#fbbf24]"></div>
            <div>
                <h1 class="text-md font-bold uppercase tracking-wider text-slate-200">AETHERCLAN_OS // EVENT_LEDGER.sys</h1>
                <p class="text-xs text-amber-400">ARCHIVAL_DATA_STREAM // SECURE_NODE</p>
            </div>
        </div>
        <nav class="flex gap-2">
            <button onclick="goToDashboard()" class="px-3 py-1.5 bg-emerald-950/40 hover:bg-emerald-900/30 text-emerald-400 border border-emerald-500/40 text-xs font-bold uppercase rounded transition-all cursor-pointer">← RETURN_TO_DASHBOARD</button>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto">
        <h2 class="text-amber-400 text-xl mb-6">EVENT_ARCHIVE_LEDGER</h2>
        <div id="ledger-list" class="space-y-2"></div>
    </main>
    
    <script>
        const SUPABASE_URL = 'https://mispbaxtkcglpdsjttja.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pc3pwYmF4dGtjZ2xwZHNqdGphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMzczOTEsImV4cCI6MjA5ODYxMzM5MX0.9YDKOHV1upxigsZSUXkYr_VNSXAc7CXlcCRu9BbIReA';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        function goToDashboard() {
            window.location.href = 'dashboard.html';
        }
        
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session && localStorage.getItem('bypass_superadmin') !== 'true') {
                window.location.href = 'index.html';
                return;
            }
        }
        
        async function loadLedger() {
            const { data } = await supabase.from('event_history').select('*').order('archived_at', { ascending: false });
            document.getElementById('ledger-list').innerHTML = data.map(e => `
                <div class="p-4 border-l-4 border-amber-500 bg-slate-900">
                    <p class="font-bold text-amber-500">${e.event_name}</p>
                    <p class="text-xs text-slate-400">WINNER: ${e.winner_name} | RANK: ${e.rank}</p>
                </div>
            `).join('');
        }
        
        checkAuth();
        loadLedger();
    </script>
</body>
</html>
