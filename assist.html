<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AETHERCLAN // ASSIST.sys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 scanlines p-4 lg:p-8">

    <!-- TOP HEADER INTERFACE -->
    <header class="max-w-7xl mx-auto mb-8 border border-emerald-500/30 bg-slate-900/40 backdrop-blur p-4 rounded flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-emerald-500 rounded-full shadow-[0_0_8px_#10b981]"></div>
            <div>
                <h1 class="text-md font-bold uppercase tracking-wider text-slate-200">AETHERCLAN_OS // ASSIST.sys</h1>
                <p class="text-xs text-emerald-400">ASSISTANCE_DISTRIBUTION // ACTIVE</p>
            </div>
        </div>
        <nav class="flex gap-2">
            <button onclick="goToDashboard()" class="px-3 py-1.5 bg-emerald-950/40 hover:bg-emerald-900/30 text-emerald-400 border border-emerald-500/40 text-xs font-bold uppercase rounded transition-all cursor-pointer">← RETURN_TO_DASHBOARD</button>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto space-y-6">
        <!-- REQUEST DISPATCH STATION -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="border border-slate-800 bg-slate-900/20 backdrop-blur rounded p-6">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-slate-800 pb-2 mb-4">📡 INITIALIZE_ASSISTANCE_BROADCAST</h2>
                <form id="assistance-form" class="space-y-4">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1">REQUEST_DETAILS / DISPATCH_STRING</label>
                        <textarea id="assist-details" rows="4" required class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs focus:outline-none focus:border-emerald-500 text-slate-200 placeholder:text-slate-700" placeholder="Specify objective requirements (e.g., Target boss clears, crafting assistance blueprints)..."></textarea>
                    </div>
                    <button type="submit" class="w-full bg-emerald-950/40 hover:bg-emerald-900/30 text-emerald-400 border border-emerald-500/30 font-bold text-xs uppercase tracking-wider py-2 rounded transition-all">INITIALIZE_BROADCAST</button>
                </form>
            </div>

            <!-- LIVE OPERATIONAL PIPELINE -->
            <div class="lg:col-span-2 border border-slate-800 bg-slate-900/20 backdrop-blur rounded p-6">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-slate-800 pb-2 mb-4">🎛️ LIVE_OPERATIONAL_PIPELINE</h2>
                <div id="assist-feed-container" class="space-y-3 max-h-[400px] overflow-y-auto pr-2">
                    <!-- Loaded Dynamically via DB -->
                </div>
            </div>
        </div>

        <!-- PENDING REQUESTS -->
        <div class="border border-slate-800 bg-slate-900/20 backdrop-blur rounded p-6">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-slate-800 pb-2 mb-4">📋 PENDING_REQUEST_QUEUE</h2>
            <div id="requests-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Requests loaded here -->
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://mispbaxtkcglpdsjttja.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pc3pwYmF4dGtjZ2xwZHNqdGphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMzczOTEsImV4cCI6MjA5ODYxMzM5MX0.9YDKOHV1upxigsZSUXkYr_VNSXAc7CXlcCRu9BbIReA';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUserProfile = null;

        function goToDashboard() {
            window.location.href = 'dashboard.html';
        }

        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session && localStorage.getItem('bypass_superadmin') !== 'true') {
                window.location.href = 'index.html';
                return false;
            }

            if (localStorage.getItem('bypass_superadmin') === 'true') {
                currentUserProfile = { character_name: 'superadmin', id: 'superadmin' };
            } else {
                const characterName = session.user.email.split('@')[0];
                const { data: profile } = await supabase.from('profiles').select('*').eq('character_name', characterName).single();
                currentUserProfile = profile;
            }
            return true;
        }

        async function handleAssistanceSubmit(event) {
            event.preventDefault();
            const detailsText = document.getElementById('assist-details').value.trim();

            if (!detailsText) return;

            const { error } = await supabase.from('assistance_requests').insert({
                profile_id: currentUserProfile.id,
                request_details: detailsText,
                status: 'PENDING',
            });

            if (!error) {
                document.getElementById('assist-details').value = '';
                await loadLiveOperationalPipeline();
            } else {
                alert('DISPATCH ERROR: Transmission pipeline blocked.');
            }
        }

        async function loadLiveOperationalPipeline() {
            const { data } = await supabase
                .from('assistance_requests')
                .select('*, profiles(character_name)')
                .order('created_at', { ascending: false });

            const container = document.getElementById('assist-feed-container');
            container.innerHTML = '';

            if (data && data.length) {
                data.forEach((req) => {
                    let badgeColor = 'border-amber-500/30 text-amber-400 bg-amber-950/20';
                    if (req.status === 'COMPLETE') badgeColor = 'border-cyan-500/30 text-cyan-300 bg-slate-950/20';
                    if (req.status === 'REJECTED') badgeColor = 'border-pink-500/30 text-pink-300 bg-slate-950/20';

                    container.innerHTML += `
                        <div class="p-4 bg-slate-900/30 border border-slate-900 rounded flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 text-xs">
                            <div class="space-y-1">
                                <div class="flex items-center gap-2">
                                    <span class="font-bold text-slate-300">${req.profiles?.character_name || 'UNKNOWN_NODE'}</span>
                                    <span class="text-[9px] text-slate-600">${new Date(req.created_at).toLocaleDateString()}</span>
                                </div>
                                <p class="text-slate-400">${req.request_details}</p>
                            </div>
                            <span class="px-2 py-0.5 border font-bold text-[9px] uppercase tracking-wider rounded ${badgeColor}">${req.status}</span>
                        </div>`;
                });
            } else {
                container.innerHTML = `<div class="text-xs text-slate-600 italic">No communications broad-cast active in regional matrix grid.</div>`;
            }
        }

        async function loadPendingRequests() {
            const { data } = await supabase
                .from('assistance_requests')
                .select('*, profiles(character_name)')
                .eq('status', 'PENDING')
                .order('created_at', { ascending: true });

            const container = document.getElementById('requests-container');
            container.innerHTML = '';

            if (data && data.length) {
                data.forEach((req) => {
                    container.innerHTML += `
                        <div class="p-4 bg-slate-900/30 border border-emerald-700/30 rounded text-xs">
                            <div class="font-bold text-emerald-400 mb-2">${req.profiles?.character_name || 'UNKNOWN'}</div>
                            <p class="text-slate-400 mb-3">${req.request_details}</p>
                            <div class="text-[9px] text-slate-600">${new Date(req.created_at).toLocaleDateString()}</div>
                        </div>`;
                });
            } else {
                container.innerHTML = `<div class="col-span-full text-xs text-slate-600 italic">No pending requests in queue.</div>`;
            }
        }

        async function initAssistPage() {
            const authed = await checkAuth();
            if (!authed) return;

            document.getElementById('assistance-form').addEventListener('submit', handleAssistanceSubmit);
            await loadLiveOperationalPipeline();
            await loadPendingRequests();
        }

        window.addEventListener('DOMContentLoaded', initAssistPage);
    </script>
</body>
</html>
