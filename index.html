<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETWORK_ACCESS // TERMINAL_GATEWAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap');
        body { font-family: 'Fira Code', monospace; background-color: #020617; }
        .scanlines {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden p-4 scanlines">

    <canvas id="matrix-bg" class="absolute inset-0 w-full h-full opacity-15 pointer-events-none z-0"></canvas>

    <div class="relative z-10 w-full max-w-md bg-slate-950/80 backdrop-blur-md border border-emerald-500/30 rounded-lg p-8 shadow-[0_0_50px_rgba(16,185,129,0.1)] transition-all duration-300 hover:border-emerald-500/50">
        
        <div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-emerald-400 rounded-tl"></div>
        <div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-emerald-400 rounded-tr"></div>
        <div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-emerald-400 rounded-bl"></div>
        <div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-emerald-400 rounded-br"></div>

        <div class="mb-6 text-center">
            <div class="inline-block px-3 py-1 bg-emerald-950/50 border border-emerald-500/30 text-emerald-400 text-xs rounded-full font-bold uppercase tracking-widest animate-pulse mb-3">
                SECURE_GATEWAY // v1.0.5
            </div>
            <h2 class="text-xl font-bold text-slate-100 tracking-tight uppercase">AetherClan Core</h2>
            <p class="text-xs text-emerald-500/70 mt-1">Initialize authentication protocol to link node.</p>
        </div>

        <div id="error-banner" class="hidden mb-4 p-3 bg-red-950/40 border border-red-500/40 rounded text-red-400 text-xs flex items-start gap-2">
            <span class="font-bold">[ERROR]</span> <span id="error-message">Access denied. Invalid signature.</span>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-[11px] font-bold text-emerald-400/80 uppercase tracking-wider mb-1">CHARACTER_NAME</label>
                <input type="text" id="character-name" required autocomplete="off"
                    class="w-full bg-slate-900/60 border border-emerald-500/20 rounded px-3 py-2 text-slate-200 text-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400 transition-all placeholder:text-slate-700" 
                    placeholder="pernzy">
            </div>

            <div>
                <label class="block text-[11px] font-bold text-emerald-400/80 uppercase tracking-wider mb-1">ACCESS_PASSKEY</label>
                <input type="password" id="passkey" required
                    class="w-full bg-slate-900/60 border border-emerald-500/20 rounded px-3 py-2 text-slate-200 text-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400 transition-all placeholder:text-slate-700" 
                    placeholder="••••••••">
            </div>

            <button type="submit" id="submit-btn"
                class="w-full mt-2 bg-emerald-600 hover:bg-emerald-500 text-slate-950 text-sm font-bold uppercase tracking-wider py-2.5 px-4 rounded shadow-[0_0_15px_rgba(16,185,129,0.3)] transition-all duration-200 active:scale-[0.98]">
                INITIALIZE_AUTH
            </button>
        </form>
    </div>

    <script>
        const SUPABASE_URL = "https://mispbaxtkcglpdsjttja.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pc3pwYmF4dGtjZ2xwZHNqdGphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMzczOTEsImV4cCI6MjA5ODYxMzM5MX0.9YDKOHV1upxigsZSUXkYr_VNSXAc7CXlcCRu9BbIReA";

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- MATRIX BACKGROUND LOGIC ---
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        const katakana = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789🧬💾📡🛰️⚡";
        const alphabet = katakana.split("");
        const fontSize = 14;
        let columns = canvas.width / fontSize;
        let rainDrops = Array(Math.floor(columns)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(2, 6, 23, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#10b981';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 30);

        // --- LOGIN ENGINE PROCESSSOR ---
        const loginForm = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorBanner = document.getElementById('error-banner');
        const errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.innerText = "CONNECTING_TO_MATRIX...";
            errorBanner.classList.add('hidden');

            // 1. Get whatever name they typed and completely clean up spaces
            let inputName = document.getElementById('character-name').value.trim();

            try {
                // 2. Scan your 'profiles' database table using case-insensitive validation
                const { data: profileNode, error: profileError } = await supabase
                    .from('profiles')
                    .select('*')
                    .ilike('character_name', inputName)
                    .maybeSingle();

                if (profileError || !profileNode) {
                    throw new Error("Character node not found on active roster.");
                }

                if (profileNode.account_status === 'DISCONNECTED') {
                    throw new Error("This character node has been deactivated by management.");
                }

                // 3. AUTO-STITCH LOGIC: Take the clean name from database, force lowercase, and attach the backend domain string
                const targetEmail = `${profileNode.character_name.toLowerCase()}@aetherclan.local`;
                const passkey = document.getElementById('passkey').value;

                // 4. Fire login using the auto-completed hidden email string
                const { error: authError } = await supabase.auth.signInWithPassword({
                    email: targetEmail,
                    password: passkey
                });

                if (authError) {
                    throw new Error("Invalid decryption key validation sequence failed.");
                }

                // Go to dashboard cleanly
                window.location.href = "dashboard.html";

            } catch (err) {
                errorMessage.innerText = err.message;
                errorBanner.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerText = "INITIALIZE_AUTH";
            }
        });
    </script>
</body>
</html>
