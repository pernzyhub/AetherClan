<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETWORK_ACCESS // TERMINAL_GATEWAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden p-4 scanlines">

    <canvas id="matrix-bg" class="absolute inset-0 w-full h-full opacity-60 pointer-events-none z-0"></canvas>

    <div class="relative z-10 w-full max-w-md neon-card rounded-3xl p-8 shadow-[0_0_60px_rgba(255,62,165,0.14)]">
        
        <div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-pink-400 rounded-tl"></div>
        <div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-cyan-400 rounded-tr"></div>
        <div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-violet-400 rounded-bl"></div>
        <div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-pink-400 rounded-br"></div>

        <div class="mb-6 text-center">
            <div class="inline-block px-3 py-1 bg-slate-950/60 border border-pink-500/30 text-pink-300 text-xs rounded-full font-bold uppercase tracking-widest animate-pulse mb-3">
                SECURE_GATEWAY // v1.0.5
            </div>
            <h2 class="text-2xl font-bold text-slate-100 tracking-tight uppercase glow">AetherClan Core</h2>
            <p class="text-xs text-slate-400 mt-1">Initialize authentication protocol to link node.</p>
        </div>

        <div id="error-banner" class="hidden mb-4 p-3 bg-red-950/40 border border-red-500/40 rounded text-red-400 text-xs flex items-start gap-2">
            <span class="font-bold">[ERROR]</span> <span id="error-message">Access denied.</span>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-[11px] font-bold text-cyan-300 uppercase tracking-wider mb-1">CHARACTER_NAME</label>
                <input type="text" id="character-name" required autocomplete="off"
                    class="w-full input-glow rounded px-3 py-2 text-slate-100 text-sm focus:outline-none focus:ring-1 focus:ring-cyan-400 transition-all placeholder:text-slate-600" 
                    placeholder="pernzy">
            </div>

            <div>
                <label class="block text-[11px] font-bold text-cyan-300 uppercase tracking-wider mb-1">ACCESS_PASSKEY</label>
                <input type="password" id="passkey" required
                    class="w-full input-glow rounded px-3 py-2 text-slate-100 text-sm focus:outline-none focus:ring-1 focus:ring-cyan-400 transition-all placeholder:text-slate-600" 
                    placeholder="••••••••">
            </div>

            <button type="submit" id="submit-btn" class="w-full neon-button text-slate-100 text-sm font-bold uppercase tracking-wider py-2.5 rounded">
                INITIALIZE_AUTH
            </button>

            <div class="text-center space-y-2">
                <div>
                    <button type="button" onclick="toggleResetForm()" class="text-xs text-cyan-400 hover:text-cyan-300 uppercase font-bold tracking-wider transition-colors">
                        FORGOT_PASSKEY?
                    </button>
                </div>
                <div class="text-xs text-slate-500">
                    NEW_NODE? <a href="register.html" class="text-pink-400 hover:text-pink-300 font-bold tracking-wider transition-colors">DEPLOY_HERE</a>
                </div>
            </div>
        </form>

        <form id="reset-form" class="space-y-4 hidden">
            <div class="mb-4 p-3 bg-cyan-950/40 border border-cyan-500/40 rounded text-cyan-400 text-xs">
                <p class="font-bold mb-1">[RESET_PROTOCOL]</p>
                <p>Enter your character name to receive a password reset link via email.</p>
            </div>

            <div>
                <label class="block text-[11px] font-bold text-cyan-300 uppercase tracking-wider mb-1">CHARACTER_NAME</label>
                <input type="text" id="reset-character-name" autocomplete="off"
                    class="w-full input-glow rounded px-3 py-2 text-slate-100 text-sm focus:outline-none focus:ring-1 focus:ring-cyan-400 transition-all placeholder:text-slate-600" 
                    placeholder="pernzy">
            </div>

            <button type="submit" id="reset-submit-btn" class="w-full neon-button text-slate-100 text-sm font-bold uppercase tracking-wider py-2.5 rounded">
                SEND_RESET_LINK
            </button>

            <div class="text-center">
                <button type="button" onclick="toggleResetForm()" class="text-xs text-cyan-400 hover:text-cyan-300 uppercase font-bold tracking-wider transition-colors">
                    BACK_TO_LOGIN
                </button>
            </div>
        </form>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
