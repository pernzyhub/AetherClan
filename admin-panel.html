<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHERCLAN // CENTRAL_ADMIN_CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 scanlines p-4 lg:p-8">

    <!-- TOP HEADER INTERFACE -->
    <header class="max-w-7xl mx-auto mb-8 purple-card backdrop-blur p-4 rounded flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-pink-400 rounded-full animate-ping"></div>
            <div>
                <h1 class="text-md font-bold uppercase tracking-wider text-slate-200 glow">AETHERCLAN_OS // CENTRAL_ADMINISTRATION_CORE</h1>
                <p class="text-xs text-pink-300">SECURE_NODE // RESTRICTED_ACCESS</p>
            </div>
        </div>
        <nav class="flex gap-2">
            <a href="dashboard.html" class="px-3 py-1.5 cyan-button text-slate-100 text-xs font-bold uppercase rounded">← RETURN_TO_DASHBOARD</a>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- 1. ROSTER NODE MANAGEMENT -->
            <div class="purple-card rounded-3xl p-6 space-y-4">
                <h2 class="text-sm font-bold text-pink-300 uppercase tracking-widest border-b border-pink-500/20 pb-2">👥 ROSTER_NODE_MANAGEMENT</h2>
                
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">DEPLOY_NEW_NODES</label>
                    <textarea id="bulk-roster-input" rows="2" class="w-full input-glow rounded px-3 py-2 text-xs focus:outline-none transition-all placeholder:text-slate-600" placeholder="Enter single name, or comma-separated list (e.g., Character1, Character2)"></textarea>
                    <button id="deploy-nodes-btn" class="w-full mt-2 violet-button text-xs font-bold uppercase tracking-wider py-1.5 rounded">INITIALIZE_NODE_DEPLOYMENT</button>
                </div>

                <hr class="border-slate-900">

                <div>
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">ACTIVE_ROSTER_STREAM</label>
                    <div id="admin-roster-list" class="space-y-2 max-h-60 overflow-y-auto pr-1">
                        <!-- Roster elements loaded dynamically -->
                    </div>
                </div>
            </div>

            <!-- 2. EVENT_CORE.sys & ATTENDANCE MANAGEMENT -->
            <div class="md:col-span-2 purple-card rounded-3xl p-6 flex flex-col justify-between">
                <div>
                    <h2 class="text-sm font-bold text-pink-300 uppercase tracking-widest border-b border-pink-500/20 pb-2 mb-4">🛰️ EVENT_CORE_LOG_ENGINE</h2>
                    <form id="event-form" class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">EVENT_TEMPLATE</label>
                            <select id="event-select" class="w-full input-glow rounded px-3 py-2 text-xs focus:outline-none transition-all placeholder:text-slate-600">
                                <option value="Sindri's Island (8:00 PM)|35">Sindri's Island (8:00 PM) [+35 pts]</option>
                                <option value="Guild War Segment|20">Guild War Segment [+20 pts]</option>
                                <option value="Minor Skirmish|5">Minor Skirmish [+5 pts]</option>
                            </select>
                        </div>
                        <div class="sm:col-span-2">
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">IMAGE_RECEIPT_PROOF (AUTOMATIC_COMPRESSION)</label>
                            <input type="file" id="event-screenshot" accept="image/*" class="w-full input-glow rounded px-2 py-1.5 text-xs text-slate-200 file:mr-4 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:font-bold file:bg-pink-950/40 file:text-pink-300 hover:file:bg-pink-900/30">
                        </div>

                        <div class="sm:col-span-3">
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">SELECT_ATTENDING_NODES</label>
                            <div id="attendance-check-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-2 bg-slate-950/60 p-3 border border-slate-900 rounded max-h-48 overflow-y-auto">
                                <!-- Checkboxes loaded dynamically -->
                            </div>
                        </div>

                        <div class="sm:col-span-3 mt-2">
                            <button type="submit" class="w-full neon-button text-slate-100 font-bold text-xs uppercase tracking-wider py-2.5 rounded">DISPATCH_EVENT_LEDGER</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- 3. INCOMING ASSIST DISPOSITION -->
        <div class="purple-card rounded-3xl p-6">
            <h2 class="text-sm font-bold text-pink-300 uppercase tracking-widest border-b border-pink-500/20 pb-2 mb-4">🎛️ INCOMING_ASSIST_DISPOSITION</h2>
            <div id="admin-assist-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Log entries load here -->
            </div>
        </div>
    </main>

    <script src="js/admin.js"></script>
</body>
</html>
