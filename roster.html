<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AETHERCLAN // ROSTER.sys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 scanlines p-4 lg:p-8">

    <!-- TOP HEADER INTERFACE -->
    <header class="max-w-7xl mx-auto mb-8 border border-emerald-500/30 bg-slate-900/40 backdrop-blur p-4 rounded flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-emerald-500 rounded-full shadow-[0_0_8px_#10b981]"></div>
            <div>
                <h1 class="text-md font-bold uppercase tracking-wider text-slate-200">AETHERCLAN_OS // ROSTER.sys</h1>
                <p class="text-xs text-emerald-400">DIRECTORY_NODE // MEMBER_STREAM</p>
            </div>
        </div>
        <nav class="flex gap-2">
            <a href="dashboard.html" class="px-3 py-1.5 bg-emerald-950/40 hover:bg-emerald-900/30 text-emerald-400 border border-emerald-500/40 text-xs font-bold uppercase rounded transition-all">← RETURN_TO_DASHBOARD</a>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto">
        <h2 class="text-emerald-400 text-xl mb-6">ROSTER_DIRECTORY</h2>
    <div id="roster-list" class="grid gap-2"></div>
    <script>
        const supabase = window.supabase.createClient("https://mispbaxtkcglpdsjttja.supabase.co", "YOUR_ANON_KEY");
        async function loadRoster() {
            const { data } = await supabase.from('profiles').select('character_name, role, account_status');
            document.getElementById('roster-list').innerHTML = data.map(m => `
                <div class="flex justify-between p-4 border border-slate-700 bg-slate-900">
                    <span>${m.character_name}</span>
                    <span class="text-slate-400">${m.role}</span>
                    <span class="${m.account_status === 'ACTIVE' ? 'text-emerald-500' : 'text-red-500'}">${m.account_status}</span>
                </div>
            `).join('');
        }
        loadRoster();
    </script>
    </main>
</body>
</html>
